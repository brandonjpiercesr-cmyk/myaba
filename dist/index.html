  <meta name="description" content="MyABA - Your personal AI companion powered by ABA" />
  <meta name="mobile-web-app-capable" content="yes" />

  <meta name="msapplication-TileColor" content="#8B5CF6" />
  <meta name="msapplication-tap-highlight" content="no" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/aba-icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/aba-icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/aba-icon-512.png" />
  <title>MyABA</title>
  <style>
    body{margin:0;padding:0;background:#08080d;overflow:hidden;font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    /* Safe area insets for notch/home indicator */
    #root{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);}
    /* PWA install banner styling */
    .pwa-install{display:none;}
    /* Minimum tap targets 44px */
    button,a{min-height:44px;min-width:44px;}
  </style>
  <script type="module" crossorigin src="/assets/index-DUY6BVjm.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    // v2.0.0: Service worker registration with update handling
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('/sw.js').then(reg=>{
          reg.addEventListener('updatefound',()=>{
            const newWorker=reg.installing;
            newWorker.addEventListener('statechange',()=>{
              if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
                // New version available - could show update prompt
                console.log('[PWA] Update available');
              }
            });
          });
        }).catch(err=>console.log('[PWA] SW registration failed:',err));
      });
    }
  </script>
</body>
</html>
